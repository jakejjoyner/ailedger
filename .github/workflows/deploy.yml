name: Deploy

# Environment promotion flow (see docs/deploy-runbook.md):
#
#   PR opened/synced  →  Workers staging deploy + Pages preview deploys + gates
#   Merge to main     →  Workers staging re-deploy + Pages production deploys
#   Release tag v*    →  Workers production deploy
#
# Pages deploys run from this workflow (not via the CF Pages Git integration):
# the integration silently stopped firing on merges in May 2026 (no commit
# statuses, no deployments — diagnosed in PR that added these jobs), so the
# main → ailedger.dev path is wired through wrangler-action here to make
# failures loud and observable in GitHub Actions. The Pages project's Git
# integration should remain DISCONNECTED to avoid racing this workflow.
#
# Secrets required (set in GitHub repo settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN    Worker-scoped API token (edit Workers + Pages,
#                           edit KV, edit D1). Distinct tokens for staging and
#                           prod recommended but not required.
#   CLOUDFLARE_ACCOUNT_ID   Jake's CF account ID.
#
# All Worker staging/production secrets (RESEND_API_KEY, SESSION_JWT_SECRET,
# ANTHROPIC_API_KEY, etc.) are managed via `wrangler secret put --env <env>`
# and NEVER live in this workflow.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  # PR runs may stomp each other on shared staging — that is acceptable and by
  # design. Prod and main have their own lane per ref.
  group: deploy-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write

jobs:
  gates:
    name: Lint / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            proxy/package-lock.json
            landing/package-lock.json
            dashboard/package-lock.json
            redirect/package-lock.json

      # proxy — only surface with a real test suite today.
      - name: proxy install
        run: npm ci
        working-directory: proxy
      - name: proxy test
        run: npm test -- --run
        working-directory: proxy

      # landing — typecheck + lint via build.
      - name: landing install
        run: npm ci
        working-directory: landing
      - name: landing lint
        run: npm run lint
        working-directory: landing
      - name: landing build
        run: npm run build
        working-directory: landing

      # dashboard — typecheck + lint via build.
      - name: dashboard install
        run: npm ci
        working-directory: dashboard
      - name: dashboard lint
        # Non-fatal: 9 pre-existing errors tracked in ai-5h6 cleanup bead.
        # Unblocks PR #17 (env-separation) without dropping lint visibility.
        continue-on-error: true
        run: npm run lint
        working-directory: dashboard
      - name: dashboard build
        run: npm run build
        working-directory: dashboard

  deploy-staging:
    name: Deploy Workers → staging
    needs: gates
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # wrangler-action@v3 defaults to wrangler@3.90, which ignores `env:` blocks
      # in wrangler.jsonc (only wrangler.toml was supported for envs in v3). Every
      # worker here uses jsonc + env.staging, so pin to wrangler@4.x.
      # JCS canary (threat model §6.8): runs in the same install context as
      # the deploy that follows, so a broken node_modules (the 2026-04-29
      # outage cause) blocks the deploy instead of shipping a chain that
      # silently forks future hashes.
      - name: proxy — wrangler deploy --env staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.84.1'
          workingDirectory: proxy
          preCommands: npm run canary
          command: deploy --env staging

      # Non-fatal: onboard-auth + john-console wrangler.jsonc still carry
      # REPLACE_WITH_*_ID placeholders for staging KV/D1 bindings. Until
      # those are provisioned and filled, these deploys fail. continue-on-error
      # keeps `redirect` (below) running and the overall job green so real
      # failures aren't lost in noise.
      - name: onboard-auth — wrangler deploy --env staging
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.84.1'
          workingDirectory: onboard-auth
          command: deploy --env staging

      - name: john-console — wrangler deploy --env staging
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.84.1'
          workingDirectory: john-console
          command: deploy --env staging

      - name: redirect — wrangler deploy --env staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.84.1'
          workingDirectory: redirect
          command: deploy --env staging

  deploy-production:
    name: Deploy Workers → production
    needs: gates
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      # GitHub "production" environment enforces required-reviewers before
      # this job runs. Configure reviewers in repo Settings → Environments.
      name: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # JCS canary (threat model §6.8) — see staging job for context.
      - name: proxy — wrangler deploy (prod)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.84.1'
          workingDirectory: proxy
          preCommands: npm run canary
          command: deploy

      - name: onboard-auth — wrangler deploy (prod)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.84.1'
          workingDirectory: onboard-auth
          command: deploy

      - name: john-console — wrangler deploy (prod)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.84.1'
          workingDirectory: john-console
          command: deploy

      - name: redirect — wrangler deploy (prod)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.84.1'
          workingDirectory: redirect
          command: deploy

  # Pages deploys — replaces the CF Pages Git integration (see top-of-file note).
  # Matrix runs landing + dashboard in parallel; fail-fast off so one project's
  # failure doesn't kill the other's deploy.
  deploy-pages-preview:
    name: Deploy Pages → preview (${{ matrix.project }})
    needs: gates
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [landing, dashboard]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - name: install
        run: npm ci
        working-directory: ${{ matrix.project }}
      - name: build
        run: npm run build
        working-directory: ${{ matrix.project }}
      - name: pages deploy (preview)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.84.1'
          workingDirectory: ${{ matrix.project }}
          command: pages deploy dist --project-name=ailedger-${{ matrix.project }} --branch=${{ github.head_ref }}

  deploy-pages-production:
    name: Deploy Pages → production (${{ matrix.project }})
    needs: gates
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [landing, dashboard]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - name: install
        run: npm ci
        working-directory: ${{ matrix.project }}
      - name: build
        run: npm run build
        working-directory: ${{ matrix.project }}
      - name: pages deploy (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.84.1'
          workingDirectory: ${{ matrix.project }}
          command: pages deploy dist --project-name=ailedger-${{ matrix.project }} --branch=main
