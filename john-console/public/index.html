<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sales.ailedger.dev — John Console</title>
<meta name="description" content="Sales sub-town contractor session entry. Chat with John.">
<style>
  :root { --bg:#0b0d10; --fg:#e4e7eb; --muted:#8b93a7; --accent:#5eacd3; --user-bg:#2a3547; --john-bg:#1a2130; --border:#2a313d; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { display: flex; flex-direction: column; height: 100vh; }
  header { padding: 0.75em 1.25em; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  header h1 { margin: 0; font-size: 1em; font-weight: 500; color: var(--muted); }
  header .status { font-size: 0.85em; color: var(--muted); }
  header .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4ade80; margin-right: 0.4em; vertical-align: middle; }
  #messages { flex: 1; overflow-y: auto; padding: 1em 1.25em; display: flex; flex-direction: column; gap: 0.85em; }
  .msg { max-width: 78ch; padding: 0.7em 1em; border-radius: 0.6em; line-height: 1.55; }
  .msg.user { align-self: flex-end; background: var(--user-bg); }
  .msg.john { align-self: flex-start; background: var(--john-bg); border: 1px solid var(--border); }
  .msg.system { align-self: center; color: var(--muted); font-style: italic; font-size: 0.9em; background: transparent; }
  .msg .label { font-size: 0.75em; color: var(--muted); margin-bottom: 0.3em; text-transform: uppercase; letter-spacing: 0.05em; }
  .msg pre { background: #000; padding: 0.6em 0.8em; border-radius: 0.4em; overflow-x: auto; font-size: 0.85em; }
  .msg code { background: rgba(0,0,0,0.3); padding: 0.1em 0.3em; border-radius: 0.2em; }
  form { display: flex; gap: 0.5em; padding: 1em 1.25em; border-top: 1px solid var(--border); background: var(--bg); }
  textarea { flex: 1; resize: none; background: var(--user-bg); color: var(--fg); border: 1px solid var(--border); border-radius: 0.4em; padding: 0.7em 0.9em; font-family: inherit; font-size: 1em; line-height: 1.4; min-height: 2.6em; max-height: 12em; }
  textarea:focus { outline: none; border-color: var(--accent); }
  button { background: var(--accent); color: #000; border: none; border-radius: 0.4em; padding: 0 1.2em; font-size: 1em; font-weight: 500; cursor: pointer; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .typing { color: var(--muted); font-style: italic; font-size: 0.9em; padding: 0 1em; }
</style>
</head>
<body>
<header>
  <h1>sales.ailedger.dev · John Console · v0.1</h1>
  <span class="status"><span class="dot"></span>Connected</span>
</header>
<div id="messages">
  <div class="msg system">New session · Start with a message to John below.</div>
</div>
<form id="composer" autocomplete="off">
  <textarea id="input" placeholder="Message John…" rows="1"></textarea>
  <button id="send" type="submit">Send</button>
</form>
<script>
const history = [];
const $messages = document.getElementById('messages');
const $input = document.getElementById('input');
const $send = document.getElementById('send');
const $form = document.getElementById('composer');

function render(role, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + (role === 'user' ? 'user' : 'john');
  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = role === 'user' ? 'you' : 'John';
  const body = document.createElement('div');
  body.textContent = text;
  el.append(lbl, body);
  $messages.append(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return body;
}

function setSystemLine(text) {
  const el = document.createElement('div');
  el.className = 'msg system';
  el.textContent = text;
  $messages.append(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return el;
}

$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    $form.requestSubmit();
  }
});

$form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = $input.value.trim();
  if (!text) return;
  $input.value = '';
  $input.style.height = 'auto';
  $send.disabled = true;
  render('user', text);
  history.push({ role: 'user', content: text });

  const typing = setSystemLine('John is thinking…');
  try {
    const r = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history }),
    });
    const data = await r.json();
    typing.remove();
    if (!r.ok) {
      setSystemLine('Error: ' + (data.error || r.status));
    } else {
      render('john', data.content);
      history.push({ role: 'assistant', content: data.content });
    }
  } catch (err) {
    typing.remove();
    setSystemLine('Network error: ' + err.message);
  } finally {
    $send.disabled = false;
    $input.focus();
  }
});
</script>
</body>
</html>
