<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>John · Sales Console</title>
<meta name="description" content="Sales sub-town contractor session entry — chat with John.">
<meta name="theme-color" content="#0a0f14">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #0a0f14;
    --bg-1: #10161d;
    --bg-2: #1a2430;
    --bg-3: #243242;
    --border: #2a3a4f;
    --border-hi: #3b5070;
    --fg-0: #f0f4f8;
    --fg-1: #c7d1dd;
    --fg-2: #7a8a9f;
    --fg-3: #4a5a6f;
    --accent: #5eead4;
    --accent-hi: #99f6e4;
    --accent-dim: #0d9488;
    --user: #3b82f6;
    --user-bg: #1e3a5f;
    --radius: 14px;
    --radius-sm: 8px;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg-0); color: var(--fg-0); font-family: 'Inter', -apple-system, sans-serif; height: 100%; font-feature-settings: "cv02", "cv04", "cv11"; }
  body { display: flex; flex-direction: column; height: 100vh; background: radial-gradient(ellipse at top, #0f1b26 0%, var(--bg-0) 60%); }

  /* Header */
  header { display: flex; align-items: center; justify-content: space-between; padding: 14px 22px; border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); background: rgba(10, 15, 20, 0.72); position: sticky; top: 0; z-index: 10; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .logo { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%); display: grid; place-items: center; font-weight: 700; font-size: 15px; color: var(--bg-0); letter-spacing: -0.02em; box-shadow: 0 2px 12px rgba(94, 234, 212, 0.25); }
  .brand-text { display: flex; flex-direction: column; line-height: 1.15; }
  .brand-name { font-weight: 600; font-size: 14px; color: var(--fg-0); letter-spacing: -0.01em; }
  .brand-sub { font-size: 11px; color: var(--fg-2); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.02em; }
  .status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--fg-2); font-family: 'JetBrains Mono', monospace; }
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); animation: pulse 2s var(--ease) infinite; }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.5); }
    70%  { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
    100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
  }

  /* Messages */
  #messages { flex: 1; overflow-y: auto; padding: 28px 22px 12px; display: flex; flex-direction: column; gap: 14px; }
  #messages::-webkit-scrollbar { width: 8px; }
  #messages::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 4px; }
  #messages::-webkit-scrollbar-thumb:hover { background: var(--border-hi); }

  .msg { max-width: min(720px, 86ch); padding: 14px 18px; border-radius: var(--radius); line-height: 1.6; font-size: 15px; animation: slideUp 0.32s var(--ease); }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.user { align-self: flex-end; background: var(--user-bg); color: var(--fg-0); border-bottom-right-radius: 4px; }
  .msg.john { align-self: flex-start; background: var(--bg-1); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.system { align-self: center; color: var(--fg-2); font-style: italic; font-size: 12.5px; background: transparent; padding: 6px 14px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.01em; }
  .msg .label { font-size: 10.5px; color: var(--fg-2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .msg.john .label { color: var(--accent); }
  .msg code { background: rgba(0, 0, 0, 0.4); padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.88em; }
  .msg pre { background: var(--bg-0); border: 1px solid var(--border); padding: 12px 14px; border-radius: var(--radius-sm); overflow-x: auto; font-size: 13px; margin: 10px 0; }
  .msg pre code { background: transparent; padding: 0; }
  .msg p { margin: 0; }
  .msg p + p { margin-top: 10px; }

  /* Typing indicator */
  .typing { align-self: flex-start; display: flex; gap: 5px; padding: 16px 20px; background: var(--bg-1); border: 1px solid var(--border); border-radius: var(--radius); border-bottom-left-radius: 4px; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: typing 1.4s var(--ease) infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30%           { opacity: 1; transform: translateY(-4px); }
  }

  /* Composer */
  .composer-wrap { padding: 14px 22px 18px; background: linear-gradient(to top, var(--bg-0) 60%, transparent); position: sticky; bottom: 0; }
  form { display: flex; gap: 10px; align-items: flex-end; background: var(--bg-1); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 6px 6px 14px; transition: border-color 0.2s var(--ease); }
  form:focus-within { border-color: var(--border-hi); box-shadow: 0 0 0 3px rgba(94, 234, 212, 0.08); }
  textarea { flex: 1; resize: none; background: transparent; color: var(--fg-0); border: 0; padding: 10px 0; font-family: inherit; font-size: 15px; line-height: 1.5; min-height: 24px; max-height: 200px; outline: none; }
  textarea::placeholder { color: var(--fg-3); }
  button.send { background: var(--accent); color: var(--bg-0); border: none; border-radius: 10px; padding: 0 18px; height: 38px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: transform 0.12s var(--ease), background 0.15s var(--ease); font-family: inherit; }
  button.send:hover:not(:disabled) { background: var(--accent-hi); transform: translateY(-1px); }
  button.send:active:not(:disabled) { transform: translateY(0); }
  button.send:disabled { opacity: 0.4; cursor: not-allowed; }
  .hint { text-align: center; font-size: 11px; color: var(--fg-3); margin-top: 10px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.02em; }
  kbd { background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--fg-1); }

  /* Banner — persistent top-of-page advisory (offline, unsupported browser) */
  #banner { display: none; padding: 10px 22px; font-size: 13px; line-height: 1.4; text-align: center; border-bottom: 1px solid; font-family: 'Inter', sans-serif; }
  #banner.show { display: block; animation: slideDown 0.3s var(--ease); }
  #banner.warn { background: rgba(251, 191, 36, 0.08); color: #fcd34d; border-color: rgba(251, 191, 36, 0.25); }
  #banner.info { background: rgba(94, 234, 212, 0.06); color: var(--accent-hi); border-color: rgba(94, 234, 212, 0.18); }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* System line with inline action button (session expired) */
  .msg.system .linklike { margin-left: 8px; background: transparent; border: 1px solid var(--border-hi); color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 2px 10px; border-radius: 6px; cursor: pointer; font-style: normal; transition: background 0.15s var(--ease); }
  .msg.system .linklike:hover { background: rgba(94, 234, 212, 0.1); }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo">J</div>
    <div class="brand-text">
      <div class="brand-name">John</div>
      <div class="brand-sub">sales-console · v0.1</div>
    </div>
  </div>
  <div class="status">
    <div class="pulse"></div>
    <span>connected</span>
  </div>
</header>
<div id="banner" role="status" aria-live="polite"></div>
<div id="messages">
  <div class="msg system">New session · type below to begin</div>
</div>
<div class="composer-wrap">
  <form id="composer" autocomplete="off">
    <textarea id="input" placeholder="Message John…" rows="1" autofocus></textarea>
    <button class="send" id="send" type="submit">
      Send
      <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path d="M3.5 10.5 16 4l-4 12.5-2.5-5-6-1Z"/></svg>
    </button>
  </form>
  <div class="hint"><kbd>Enter</kbd> send · <kbd>Shift</kbd>+<kbd>Enter</kbd> newline</div>
</div>
<script>
const history = [];
const $messages = document.getElementById('messages');
const $input = document.getElementById('input');
const $send = document.getElementById('send');
const $form = document.getElementById('composer');
const $banner = document.getElementById('banner');

const REQUEST_TIMEOUT_MS = 30_000;
const RATE_LIMIT_COOLDOWN_S = 10;

let sendLocked = false;      // 429 countdown / session-ended lockouts
let offlineLock = false;     // toggled by online/offline events

function setBanner(kind, text) {
  // kind: 'warn' | 'info' | null (null hides)
  if (!kind) { $banner.className = ''; $banner.textContent = ''; return; }
  $banner.className = kind + ' show';
  $banner.textContent = text;
}

function updateSendEnabled() {
  $send.disabled = sendLocked || offlineLock;
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
// Minimal markdown → HTML for John's replies
function renderMarkdown(text) {
  let html = escapeHtml(text);
  html = html.replace(/```([\s\S]*?)```/g, (_, code) => `<pre><code>${code.trim()}</code></pre>`);
  html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  // paragraph breaks on double newlines
  html = html.split(/\n{2,}/).map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
  return html;
}

function renderMessage(role, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = role === 'user' ? 'you' : 'John';
  const body = document.createElement('div');
  if (role === 'john') body.innerHTML = renderMarkdown(text);
  else body.textContent = text;
  el.append(lbl, body);
  $messages.append(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return el;
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'typing';
  el.innerHTML = '<span></span><span></span><span></span>';
  $messages.append(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return el;
}

function setSystemLine(text) {
  const el = document.createElement('div');
  el.className = 'msg system';
  el.textContent = text;
  $messages.append(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return el;
}

function systemLineWithAction(text, actionLabel, onClick) {
  const el = document.createElement('div');
  el.className = 'msg system';
  el.textContent = text;
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'linklike';
  btn.textContent = actionLabel;
  btn.addEventListener('click', onClick);
  el.append(btn);
  $messages.append(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return el;
}

// POST /chat with a 30s abort + auto-retry on 5xx (once).
async function postChat(messages, { retried = false, onRetry } = {}) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);
  let r, data;
  try {
    r = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages }),
      signal: controller.signal,
    });
  } finally {
    clearTimeout(timer);
  }
  try { data = await r.json(); } catch { data = {}; }

  if (r.status >= 500 && r.status < 600 && !retried) {
    if (onRetry) onRetry();
    return postChat(messages, { retried: true, onRetry });
  }
  return { ok: r.ok, status: r.status, data };
}

function startRateLimitCountdown(seconds) {
  sendLocked = true;
  updateSendEnabled();
  const line = setSystemLine('John is busy — ' + seconds + 's please');
  let remaining = seconds;
  const tick = setInterval(() => {
    remaining -= 1;
    if (remaining <= 0) {
      clearInterval(tick);
      line.textContent = 'ready — send again';
      sendLocked = false;
      updateSendEnabled();
      $input.focus();
    } else {
      line.textContent = 'John is busy — ' + remaining + 's please';
    }
  }, 1000);
}

function handleSessionExpired() {
  sendLocked = true;
  updateSendEnabled();
  systemLineWithAction('Session ended — sign in again.', 'Sign in', () => {
    // Auth flow owner (ai-6qf) decides the login path; /login is the conventional entry.
    window.location.href = '/login';
  });
}

$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); $form.requestSubmit(); }
});
$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 200) + 'px';
});

$form.addEventListener('submit', async (e) => {
  e.preventDefault();
  if (sendLocked || offlineLock) return;
  const text = $input.value.trim();
  if (!text) return;
  $input.value = '';
  $input.style.height = 'auto';
  sendLocked = true;
  updateSendEnabled();
  renderMessage('user', text);
  history.push({ role: 'user', content: text });

  const typingEl = showTyping();
  let unlockAfter = true;
  let retryLine = null;
  try {
    const { ok, status, data } = await postChat(history, {
      onRetry: () => { retryLine = setSystemLine('Something on our side — retrying.'); },
    });
    typingEl.remove();
    if (retryLine) { retryLine.remove(); retryLine = null; }
    if (ok) {
      renderMessage('john', data.content);
      history.push({ role: 'assistant', content: data.content });
    } else if (status === 401 || status === 403) {
      handleSessionExpired();
      unlockAfter = false;
    } else if (status === 429) {
      startRateLimitCountdown(RATE_LIMIT_COOLDOWN_S);
      unlockAfter = false;
    } else if (status >= 500) {
      // already auto-retried once inside postChat.
      setSystemLine('Something on our side — try again in a moment.');
    } else {
      setSystemLine('error: ' + (data.error || status));
    }
  } catch (err) {
    typingEl.remove();
    if (retryLine) { retryLine.remove(); retryLine = null; }
    if (err.name === 'AbortError') {
      setSystemLine('Ask again — that one got stuck.');
    } else if (!navigator.onLine) {
      setSystemLine('Offline — your message will need to be resent when you reconnect.');
    } else {
      setSystemLine('network: ' + err.message);
    }
  } finally {
    if (unlockAfter) {
      sendLocked = false;
      updateSendEnabled();
      $input.focus();
    }
  }
});

// --- Ambient state: network + browser capability -----------------------------

function reflectOnlineState() {
  if (navigator.onLine) {
    offlineLock = false;
    // Only clear the banner if it's the offline one (don't stomp on webauthn warn).
    if ($banner.dataset.kind === 'offline') setBanner(null);
    updateSendEnabled();
  } else {
    offlineLock = true;
    $banner.dataset.kind = 'offline';
    setBanner('warn', "You're offline — waiting for your connection to come back.");
    updateSendEnabled();
  }
}
window.addEventListener('online', reflectOnlineState);
window.addEventListener('offline', reflectOnlineState);
reflectOnlineState();

// WebAuthn / passkey support detection — only surface if offline isn't already
// occupying the banner, and only on browsers that clearly can't do passkeys.
if (!navigator.onLine) {
  // offline banner wins
} else if (typeof window.PublicKeyCredential === 'undefined') {
  $banner.dataset.kind = 'webauthn';
  setBanner('warn', "Your browser doesn't support passkeys — use the email sign-in link instead.");
}
</script>
</body>
</html>
