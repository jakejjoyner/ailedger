    <!-- FAQ structured data for rich snippets -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is the EU AI Act Article 12?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Article 12 of the EU AI Act (Regulation 2024/1689) requires operators of high-risk AI systems to maintain automatic logging of events throughout the system's lifetime. These logs must be tamper-evident and sufficient to enable post-hoc auditing."
          }
        },
        {
          "@type": "Question",
          "name": "Does AILedger store my prompts or AI outputs?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. AILedger never stores raw inputs or outputs. It stores only SHA-256 cryptographic hashes - one-way fingerprints that prove a specific exchange occurred without retaining any content."
          }
        },
        {
          "@type": "Question",
          "name": "How long does integration take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "For OpenAI, Anthropic, Gemini, or any OpenAI-compatible API, integration means pointing your client at our proxy and adding our API key as a header. Most teams are logging within 60 seconds of creating an account."
          }
        },
        {
          "@type": "Question",
          "name": "Where is data stored?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "All data is stored in the EU, namely AWS eu-central-1 (Frankfurt, Germany) via Supabase. This applies to all plans, free and paid. No data ever leaves the EU."
          }
        }
      ]
    }
    </script>
